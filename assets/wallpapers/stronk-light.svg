<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 768" width="1366" height="768">
  <defs>
    <!-- Background gradient: subtle warm-to-cool sweep -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E8F0FE"/>
    </linearGradient>
    <!-- Accent gradient for geometric shapes -->
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.01"/>
    </linearGradient>
    <!-- Radial glow in bottom-right -->
    <radialGradient id="glow" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1366" height="768" fill="url(#bg)"/>

  <!-- Subtle geometric layers — privacy shield motif -->
  <!-- Large soft arc: bottom-left -->
  <ellipse cx="200" cy="900" rx="600" ry="500" fill="url(#accent1)"/>
  <!-- Sweeping curve: top-right -->
  <ellipse cx="1200" cy="-100" rx="500" ry="400" fill="url(#accent2)"/>
  <!-- Radial glow -->
  <rect width="1366" height="768" fill="url(#glow)"/>

  <!-- Thin geometric lines — subtle grid/structure motif -->
  <line x1="683" y1="0" x2="683" y2="768" stroke="#3B82F6" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="384" x2="1366" y2="384" stroke="#3B82F6" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Abstract shield shape (bottom-right, very subtle) -->
  <path d="M1100,500 Q1100,460 1130,440 L1180,420 L1230,440 Q1260,460 1260,500 L1260,560 Q1260,620 1180,660 Q1100,620 1100,560 Z"
        fill="none" stroke="#3B82F6" stroke-opacity="0.06" stroke-width="1.5"/>
</svg>
