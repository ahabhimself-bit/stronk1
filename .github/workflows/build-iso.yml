name: Build Stronk 1 ISO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Manual trigger

jobs:
  evaluate:
    name: Evaluate flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cosmic.cachix.org
            extra-trusted-public-keys = cosmic.cachix.org-1:Dya9IyXD4HkqkjQ+kAP+HcqNPNSKY6HSPGHO4p9pis=
      - name: Evaluate all NixOS configurations
        run: |
          for cfg in stronk-generic stronk-kefka stronk-setzer stronk-snappy; do
            echo "Evaluating $cfg..."
            nix eval ".#nixosConfigurations.$cfg.config.system.stateVersion"
          done
          echo "Evaluating ISO derivation..."
          nix eval .#packages.x86_64-linux.iso.name

  build:
    name: Build ISO
    needs: evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cosmic.cachix.org
            extra-trusted-public-keys = cosmic.cachix.org-1:Dya9IyXD4HkqkjQ+kAP+HcqNPNSKY6HSPGHO4p9pis=

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true

      - name: Build ISO
        run: nix build .#packages.x86_64-linux.iso --print-build-logs
        timeout-minutes: 120

      - name: Check ISO size (must be under 800MB)
        run: |
          ISO_PATH=$(find result/ -name '*.iso' -type f | head -1)
          ISO_SIZE=$(stat -c%s "$ISO_PATH")
          ISO_MB=$((ISO_SIZE / 1048576))
          echo "ISO size: ${ISO_MB}MB"
          if [ "$ISO_MB" -gt 800 ]; then
            echo "::error::ISO is ${ISO_MB}MB, exceeds 800MB limit"
            exit 1
          fi
          echo "PASS: ISO is ${ISO_MB}MB (under 800MB)"

      - name: Upload ISO artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: stronk1-iso
          path: result/iso/*.iso
          retention-days: 14
